services:
  # ── Frontend (Express proxy + Vite SPA) ──────────────────────────────────────
  - type: web
    name: demoshop-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: NODE_ENV=production node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRODUCT_CATALOG_URL
        value: https://demoshop-catalog.onrender.com
      - key: CART_URL
        value: https://demoshop-cart.onrender.com
      - key: CHECKOUT_URL
        value: https://demoshop-checkout.onrender.com

  # ── Product Catalog Service ───────────────────────────────────────────────────
  - type: web
    name: demoshop-catalog
    runtime: node
    plan: free
    rootDir: product-catalog-svc
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # ── Cart Service ──────────────────────────────────────────────────────────────
  - type: web
    name: demoshop-cart
    runtime: node
    plan: free
    rootDir: cart-svc
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # ── Payment Service ───────────────────────────────────────────────────────────
  - type: web
    name: demoshop-payment
    runtime: node
    plan: free
    rootDir: payment-svc
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # ── Checkout Service (Java Spring Boot via Docker) ────────────────────────────
  - type: web
    name: demoshop-checkout
    runtime: docker
    plan: free
    rootDir: checkout-svc
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CART_SERVICE_URL
        value: https://demoshop-cart.onrender.com
      - key: PAYMENT_SERVICE_URL
        value: https://demoshop-payment.onrender.com
